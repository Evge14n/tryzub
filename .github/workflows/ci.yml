name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Тест
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Встановити системні залежності (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

    - name: Встановити Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Кеш Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Збірка
      run: cargo build --verbose -p tryzub-lexer -p tryzub-parser -p tryzub-vm

    - name: Тести
      run: cargo test --verbose -p tryzub-lexer -p tryzub-parser -p tryzub-vm

    - name: Clippy
      run: cargo clippy -p tryzub-lexer -p tryzub-parser -p tryzub-vm -- -A warnings

    - name: Форматування
      run: cargo fmt -- --check
      continue-on-error: true

  build-release:
    name: Збірка релізу
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
    steps:
    - uses: actions/checkout@v4

    - name: Встановити Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Збірка
      run: cargo build --release --target ${{ matrix.target }}

    - name: Пакування
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        tar czf ../../../tryzub-${{ matrix.target }}.tar.gz tryzub${{ matrix.suffix }}

    - name: Артефакти
      uses: actions/upload-artifact@v4
      with:
        name: tryzub-${{ matrix.target }}
        path: tryzub-${{ matrix.target }}.tar.gz

  publish:
    name: Публікація
    needs: [build-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4

    - name: Створити реліз
      uses: softprops/action-gh-release@v2
      with:
        files: tryzub-*/tryzub-*.tar.gz
